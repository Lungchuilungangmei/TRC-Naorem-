<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TRC Naorem Rongmei Kailong</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#111;
color:white;
}

header{
position:fixed;
top:0;
left:0;
width:100%;
padding:20px 50px;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(0,0,0,.45);
backdrop-filter:blur(8px);
z-index:1000;
}

.logo{
font-size:28px;
font-weight:bold;
color:#fff;
}

nav a{
color:white;
text-decoration:none;
margin-left:25px;
font-size:17px;
transition:.3s;
}

nav a:hover{
color:#d4a017;
}

.hero{
height:100vh;
background:url("hero.jpg") center center/cover no-repeat;
display:flex;
align-items:center;
padding:80px;
}

.hero-text{
max-width:700px;
background:rgba(0,0,0,.35);
padding:30px;
border-radius:10px;
}

.hero h1{
font-size:60px;
line-height:1.2;
margin-bottom:20px;
}

.hero p{
font-size:22px;
margin-bottom:30px;
}

.button{
display:inline-block;
padding:15px 35px;
background:#d4a017;
color:white;
text-decoration:none;
border-radius:8px;
font-size:18px;
}

.button:hover{
background:#b88900;
}

</style>
</head>

<body>

<header>
<div class="logo">TRC NAOREM</div>

<nav>
<a href="#">Home</a>
<a href="#">About</a>
<a href="#">History</a>
<a href="#">Culture</a>
<a href="#">Festivals</a>
<a href="#">Documents</a>
<a href="#">Gallery</a>
<a href="#">Contact</a>
</nav>

</header>

<section class="hero">

<div class="hero-text">

<h1>
Preserving Our Past,<br>
Celebrating Our Present,<br>
Inspiring Our Future.
</h1>

<p>
A digital archive of our village history, culture,
festivals and traditions for generations to come.
</p>

<a class="button" href="#">Explore Our Heritage</a>

</div>

</section>

</body>
</html>
